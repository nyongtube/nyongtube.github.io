    --paper:#FBF4EC; --card:#FFFFFF; --ink:#2A2320; --muted:#9A8C7E;
    --accent:#E0792E; --accent-deep:#C0392B; --line:#ECE2D6; font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    padding:30px 18px 60px;}
  .head{margin:8px 4px 35px;}
  .head .dot{display:inline-grid;place-items:center;width:46px;height:46px;border-radius:13px;
    background:var(--accent);font-size:25px;box-shadow:0 3px 0 var(--accent-deep);margin-bottom:14px;}
  h1{font-family:"Fredoka",sans-serif;font-weight:700;font-size:2rem;margin:0 0 4px 8px;letter-spacing:-.02em;display:inline-block;}
  .head p{color:var(--muted);font-size:.86rem;margin:0;}
  .grid{display:flex;flex-direction:column;gap:12px;margin:0 auto;}
  a.ch{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 20px;
    transition:transform .08s, box-shadow .15s;}
  a.ch:active{transform:scale(.99);}
  a.ch .no{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;
    background:#FBE9E1;color:var(--accent);font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.2rem;}
  a.ch .tx{flex:1;min-width:0;}
  a.ch .nm{font-weight:700;font-size:1.12rem;}
  a.ch .cnt{color:var(--muted);font-size:.78rem;margin-top:3px;}
  a.ch .go{color:var(--muted);font-size:1.3rem;opacity:.5;}
  .foot{text-align:center;color:var(--muted);font-size:.72rem;margin-top:26px;}
</style>

  <div class="head">
    <span class="dot">📋</span>

      <span class="no">4</span>
      <span class="tx"><div class="nm">임시 3</div><div class="cnt" id="cnt-dokgam">불러오는 중…</div></span>
      <span class="go">→</span>
    </a>
  </div>
  <div class="foot">탭 한 번으로 복사 · 붙여넣기만 하면 끝</div>

<script>
// 각 채널의 CSV를 불러와 개수를 계산해 버튼 아래에 표시.
const CH_META = [
  { key:"ginger", csv:"first.csv",  kind:"캡션" },
  { key:"human",  csv:"second.csv", kind:"캡션" },
  { key:"nubi",   csv:"third.csv",  kind:"캡션" },
  { key:"dokgam", csv:"fourth.csv", kind:"캡션" },
];

function parseCSV(text){
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = []; let row = [], cur = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"'){ if (text[i+1] === '"'){ cur += '"'; i++; } else inQ = false; }
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cur); cur = ""; }
      else if (c === '\n'){ row.push(cur); rows.push(row); row = []; cur = ""; }
      else if (c === '\r'){ /* skip */ }
      else cur += c;
    }
  }
  if (cur !== "" || row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function countText(text){
  const grid = parseCSV(text).filter(row => row.some(c => (c||"").trim() !== ""));
  const n = Math.max(0, grid.length - 1);   // 헤더 제외 데이터 행 수 = 편 수 (한 행 = 한 편)
  return n + "편";
}

CH_META.forEach(m => {
  const el = document.getElementById("cnt-" + m.key);
  if (!el) return;
  fetch(m.csv + "?v=" + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(t => { el.textContent = countText(t); })
    .catch(() => { el.textContent = "—"; });
});
</script>
