<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>캡션 허브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF4EC; --card:#FFFFFF; --ink:#2A2320; --muted:#9A8C7E;
    --accent:#E0792E; --accent-deep:#C0392B; --line:#ECE2D6; font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    padding:30px 18px 60px;}
  .head{margin:8px 4px 22px;}
  .head .dot{display:inline-grid;place-items:center;width:46px;height:46px;border-radius:13px;
    background:var(--accent);font-size:25px;box-shadow:0 3px 0 var(--accent-deep);margin-bottom:14px;}
  h1{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.55rem;margin:0 0 4px;letter-spacing:-.02em;}
  .head p{color:var(--muted);font-size:.86rem;margin:0;}
  .grid{display:flex;flex-direction:column;gap:12px;max-width:520px;margin:0 auto;}
  a.ch{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 18px;
    transition:transform .08s, box-shadow .15s;}
  a.ch:active{transform:scale(.99);}
  a.ch .em{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;font-size:26px;flex-shrink:0;}
  a.ch .tx{flex:1;min-width:0;}
  a.ch .nm{font-weight:700;font-size:1.08rem;}
  a.ch .ds{color:var(--muted);font-size:.8rem;margin-top:2px;}
  a.ch .go{color:var(--muted);font-size:1.3rem;opacity:.5;}
  .g-ginger .em{background:#FBE9E1;} .g-human .em{background:#E7E9F2;}
  .g-nubi .em{background:#EAF3EC;}   .g-dokgam .em{background:#F6ECF3;}
  .foot{text-align:center;color:var(--muted);font-size:.72rem;margin-top:26px;}
</style>
</head>
<body>
  <div class="head">
    <span class="dot">📋</span>
    <h1>캡션 복사기</h1>
    <p>채널을 고르면 캡션을 탭 한 번으로 복사할 수 있어요.</p>
  </div>
  <div class="grid">
    <a class="ch g-ginger" href="channel.html?ch=ginger">
      <span class="em">🐱</span>
      <span class="tx"><div class="nm">셰프진저</div><div class="ds">Chef Ginger · 요리하는 고양이</div></span>
      <span class="go">→</span>
    </a>
    <a class="ch g-human" href="channel.html?ch=human">
      <span class="em">🧠</span>
      <span class="tx"><div class="nm">휴먼탐구소</div><div class="ds">사람 탐구 · ○○한 사람의 특징</div></span>
      <span class="go">→</span>
    </a>
    <a class="ch g-nubi" href="channel.html?ch=nubi">
      <span class="em">🐈</span>
      <span class="tx"><div class="nm">누비툰</div><div class="ds">게으른 고양이 공감</div></span>
      <span class="go">→</span>
    </a>
    <a class="ch g-dokgam" href="channel.html?ch=dokgam">
      <span class="em">🐰</span>
      <span class="tx"><div class="nm">독감툰</div><div class="ds">토끼와 감자 커플툰</div></span>
      <span class="go">→</span>
    </a>
  </div>
  <div class="foot">탭 한 번으로 복사 · 붙여넣기만 하면 끝</div>
</body>
</html>
