<style>
  :root{
    --paper:#FBF4EC; --card:#FFFFFF; --ink:#2A2320; --muted:#9A8C7E;
    --accent:#E0792E; --accent-deep:#C0392B; --line:#ECE2D6; font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    padding:30px 18px 60px;}
  .head{margin:8px 4px 22px;}
  .head .dot{display:inline-grid;place-items:center;width:46px;height:46px;border-radius:13px;
    background:var(--accent);font-size:25px;box-shadow:0 3px 0 var(--accent-deep);margin-bottom:14px;}
  h1{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.55rem;margin:0 0 4px;letter-spacing:-.02em;}
  .head p{color:var(--muted);font-size:.86rem;margin:0;}
  .grid{display:flex;flex-direction:column;gap:12px;max-width:520px;margin:0 auto;}
  a.ch{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 20px;
    transition:transform .08s, box-shadow .15s;}
  a.ch:active{transform:scale(.99);}
  a.ch .tx{flex:1;min-width:0;}
  a.ch .nm{font-weight:700;font-size:1.12rem;}
  a.ch .go{color:var(--muted);font-size:1.3rem;opacity:.5;}
  .foot{text-align:center;color:var(--muted);font-size:.72rem;margin-top:26px;}
</style>
</head>
<body>
  <div class="head">
    <span class="dot">📋</span>
    <h1>캡션 허브</h1>
    <p>채널을 고르면 캡션·프롬프트를 탭 한 번으로 복사할 수 있어요.</p>
  </div>
  <div class="grid">
    <a class="ch" href="channel.html?ch=ginger">
      <span class="tx"><div class="nm">ginger</div></span>
      <span class="go">→</span>
    </a>
    <a class="ch" href="channel.html?ch=human">
      <span class="tx"><div class="nm">human</div></span>
      <span class="go">→</span>
    </a>
    <a class="ch" href="channel.html?ch=nubi">
      <span class="tx"><div class="nm">nubi</div></span>
      <span class="go">→</span>
    </a>
    <a class="ch" href="channel.html?ch=dokgam">
      <span class="tx"><div class="nm">dokgam</div></span>
      <span class="go">→</span>
    </a>
  </div>
  <div class="foot">탭 한 번으로 복사 · 붙여넣기만 하면 끝</div>
</body>
</html>
