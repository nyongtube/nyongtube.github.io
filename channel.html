<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<title>캡션 복사기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF4EC; --card:#FFFFFF; --ink:#2A2320; --muted:#9A8C7E;
    --accent:#E0792E; --accent-deep:#C0392B; --line:#ECE2D6;
    --tiktok:#161823; --instagram:#C13584; --ytt:#CC0000; --ytd:#E0594B;
    --ok:#2E9E6B; --radius:16px; font-size:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.45;padding-bottom:60px;}
  .top{position:sticky;top:0;z-index:10;
    background:linear-gradient(180deg,var(--paper) 72%,rgba(251,244,236,0));padding:14px 16px 10px;}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .back{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);
    display:grid;place-items:center;text-decoration:none;color:var(--ink);font-size:18px;flex-shrink:0;}
  .dot{width:30px;height:30px;border-radius:9px;background:var(--accent);
    display:grid;place-items:center;font-size:17px;box-shadow:0 2px 0 var(--accent-deep);flex-shrink:0;}
  .ttl{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.12rem;margin:0;letter-spacing:-.01em;flex:1;min-width:0;}
  .ttl small{display:block;color:var(--muted);font-size:.72rem;font-weight:400;margin-top:1px;}
  .search{position:relative;}
  .search input{width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:13px;
    padding:13px 14px 13px 40px;font-size:16px;color:var(--ink);outline:none;transition:border-color .15s;}
  .search input:focus{border-color:var(--accent);}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.45;}
  .wrap{padding:4px 16px 0;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:11px;overflow:hidden;}
  .head{display:flex;align-items:center;gap:10px;padding:15px;cursor:pointer;user-select:none;}
  .num{font-family:"Fredoka",sans-serif;font-weight:600;color:var(--accent);font-size:.85rem;min-width:22px;}
  .names{flex:1;min-width:0;}
  .nm{font-weight:600;font-size:.97rem;word-break:break-word;}
  .badge{font-size:.66rem;font-weight:600;color:#fff;background:var(--muted);padding:3px 7px;border-radius:999px;white-space:nowrap;}
  .badge.up{background:var(--ok);} .badge.new{background:var(--accent);}
  .chev{transition:transform .2s;opacity:.4;flex-shrink:0;}
  .card.open .chev{transform:rotate(180deg);}
  .body{display:none;padding:0 12px 12px;}
  .card.open .body{display:block;}
  .pf{display:flex;flex-direction:column;gap:6px;width:100%;text-align:left;border:1px solid var(--line);
    background:#FCFAF7;border-radius:12px;margin-top:8px;padding:12px 14px;cursor:pointer;
    font:inherit;color:inherit;transition:background .15s,border-color .15s,transform .08s;}
  .pf:active{transform:scale(.995);}
  .pf.copied{background:#EAF7F0;border-color:var(--ok);}
  .pf-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pf .pl{font-size:.82rem;font-weight:700;letter-spacing:.01em;}
  .ntag{font-size:.64rem;font-weight:600;color:#fff;background:var(--muted);padding:2px 7px;border-radius:999px;white-space:nowrap;}
  .tap{margin-left:auto;font-size:.7rem;color:var(--muted);font-weight:600;flex-shrink:0;}
  .pf.copied .tap{color:var(--ok);}
  .pv{font-size:.82rem;color:var(--muted);line-height:1.5;white-space:pre-wrap;word-break:break-word;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .t-tiktok .pl{color:var(--tiktok);}
  .t-instagram .pl{color:var(--instagram);}
  .t-ytt .pl{color:var(--ytt);}
  .t-ytd .pl{color:var(--ink);}
  .state{text-align:center;color:var(--muted);padding:40px 20px;font-size:.9rem;}
  .loadmore{min-height:1px;}
  .dotswrap{display:flex;justify-content:center;padding:14px 0 26px;}
  .dots{display:inline-flex;gap:5px;}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:cbounce 1s infinite ease-in-out;}
  .dots i:nth-child(2){animation-delay:.15s;} .dots i:nth-child(3){animation-delay:.3s;}
  @keyframes cbounce{0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-5px);opacity:.9;}}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:11px 20px;border-radius:999px;font-size:.86rem;font-weight:600;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.2);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);} .toast.err{background:var(--accent-deep);}
  .hint{color:var(--muted);font-size:.72rem;text-align:center;padding:6px 20px 0;}
</style>
</head>
<body>
  <div class="top">
    <div class="bar">
      <a class="back" href="index.html" aria-label="홈">←</a>
      <span class="dot" id="dot">🐱</span>
      <h1 class="ttl" id="ttl">캡션<small id="sub">불러오는 중…</small></h1>
    </div>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="검색…" autocomplete="off">
    </div>
  </div>
  <div class="wrap" id="list"><div class="state">불러오는 중…</div></div>
  <div class="hint" id="hint">제목을 탭하면 펼쳐지고, 플랫폼을 탭하면 바로 복사돼요.</div>
  <div class="toast" id="toast"></div>

<script>
// ── 채널 설정 ──────────────────────────────────────────────
const CHANNELS = {
  ginger: { name:"셰프진저",   sub:"Chef Ginger",  emoji:"🐱", csv:"ginger.csv" },
  // 프롬프트 채널: 편(그룹)별 아코디언 → 내부 클립별 복사 버튼.
  // human 탭 컬럼 = 편, 클립, 프롬프트, 비고
  human:  { name:"셰프진저 프롬프트", sub:"클립별 영상 프롬프트", emoji:"🎬", csv:"human.csv",
            mode:"prompts", groupKey:"편", clipKey:"클립", textKey:"프롬프트" },
  nubi:   { name:"누비툰",     sub:"게으른 고양이", emoji:"🐈", csv:"nubi.csv" },
  dokgam: { name:"독감툰",     sub:"토끼와 감자",   emoji:"🐰", csv:"dokgam.csv" },
};
const DEFAULT_PLATS = [
  { key:"TikTok",              label:"TikTok",       cls:"t-tiktok" },
  { key:"Instagram",           label:"Instagram",    cls:"t-instagram" },
  { key:"YouTube Title",       label:"YouTube 제목", cls:"t-ytt" },
  { key:"YouTube Description", label:"YouTube 설명", cls:"t-ytd" },
];

// ── 어떤 채널인지 (?ch=ginger) ──────────────────────────────
const params = new URLSearchParams(location.search);
const chKey = params.get("ch") || "ginger";
const CH = CHANNELS[chKey] || CHANNELS.ginger;
const PLATS = CH.plats || DEFAULT_PLATS;
const MODE = CH.mode || "caption";   // "caption" | "prompts"

const listEl = document.getElementById("list");
const toastEl = document.getElementById("toast");
let toastTimer, ROWS = [], GROUPS = [];

document.getElementById("ttl").childNodes[0].nodeValue = (MODE==="prompts" ? "프롬프트" : "캡션");
document.getElementById("sub").textContent = CH.sub;
document.getElementById("dot").textContent = CH.emoji;
document.getElementById("q").placeholder = CH.name + " 검색…";
document.title = CH.name + (MODE==="prompts" ? " 프롬프트" : " 캡션");
if (MODE==="prompts") document.getElementById("hint").textContent = "편을 탭하면 펼쳐지고, 클립을 탭하면 프롬프트가 복사돼요.";

// ── 간단한 CSV 파서 (따옴표·줄바꿈 지원) ─────────────────────
function parseCSV(text){
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // BOM 제거
  const rows = []; let row = [], cur = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"'){ if (text[i+1] === '"'){ cur += '"'; i++; } else inQ = false; }
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cur); cur = ""; }
      else if (c === '\n'){ row.push(cur); rows.push(row); row = []; cur = ""; }
      else if (c === '\r'){ /* skip */ }
      else cur += c;
    }
  }
  if (cur !== "" || row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── 프롬프트 모드: 편(그룹)으로 묶기 (CSV 순서 유지) ─────────
function buildGroups(){
  GROUPS = []; const idx = {};
  ROWS.forEach((r,i) => {
    const ep = (r[CH.groupKey]||"").trim() || "기타";
    if (!(ep in idx)){ idx[ep] = GROUPS.length; GROUPS.push({ ep, items: [] }); }
    GROUPS[idx[ep]].items.push(i);
  });
}

// ── 렌더링 (15개씩 무한 스크롤 + 검색 디바운스) ──────────────
const CHUNK = 15;
let view = [];
let rendered = 0;
let curFilter = "";
let loading = false;

const sentinel = document.createElement("div");
sentinel.className = "loadmore";
sentinel.style.display = "none";
listEl.after(sentinel);
const io = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && rendered < view.length) loadMore();
}, { rootMargin: "300px" });
io.observe(sentinel);

const CHEV = `<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg>`;

// 캡션 카드 (기존 방식)
function buildCaptionCard(i){
  const r = ROWS[i];
  const title = r["요리/주제"] || "";
  const card = document.createElement("div");
  card.className = "card" + (curFilter ? " open" : "");
  const note = r["비고"] || "";
  let badge = "";
  if (note){
    const cls = /업로드/.test(note) ? "up" : (/NEW/i.test(note) ? "new" : "");
    badge = `<span class="badge ${cls}">${escapeHtml(note)}</span>`;
  }
  let btns = "";
  PLATS.forEach(p => {
    const val = r[p.key] || "";
    if (!val.trim()) return;
    btns += `<button class="pf ${p.cls}" data-i="${i}" data-k="${escapeHtml(p.key)}">
      <span class="pf-top"><span class="pl">${p.label}</span><span class="tap">탭하면 복사 📋</span></span>
      <span class="pv">${escapeHtml(val)}</span>
    </button>`;
  });
  card.innerHTML = `
    <div class="head">
      <span class="num">${String(i+1).padStart(2,'0')}</span>
      <span class="names"><span class="nm">${escapeHtml(title)}</span></span>
      ${badge}${CHEV}
    </div>
    <div class="body">${btns}</div>`;
  card.querySelector(".head").addEventListener("click", () => card.classList.toggle("open"));
  return card;
}

// 프롬프트 카드 (편 아코디언 → 클립별 복사 버튼)
function buildGroupCard(g){
  const grp = GROUPS[g];
  const card = document.createElement("div");
  card.className = "card" + (curFilter ? " open" : "");
  let btns = "";
  grp.items.forEach(i => {
    const clip = ROWS[i][CH.clipKey] || "";
    const text = ROWS[i][CH.textKey] || "";
    const note = ROWS[i]["비고"] || "";
    if (!text.trim()) return;
    const ntag = note ? `<span class="ntag">${escapeHtml(note)}</span>` : "";
    btns += `<button class="pf t-ytd" data-i="${i}" data-k="${escapeHtml(CH.textKey)}">
      <span class="pf-top"><span class="pl">${escapeHtml(clip)}</span>${ntag}<span class="tap">탭하면 복사 📋</span></span>
      <span class="pv">${escapeHtml(text)}</span>
    </button>`;
  });
  const badge = `<span class="badge">${grp.items.length}클립</span>`;
  card.innerHTML = `
    <div class="head">
      <span class="num">${String(g+1).padStart(2,'0')}</span>
      <span class="names"><span class="nm">${escapeHtml(grp.ep)}</span></span>
      ${badge}${CHEV}
    </div>
    <div class="body">${btns}</div>`;
  card.querySelector(".head").addEventListener("click", () => card.classList.toggle("open"));
  return card;
}

function buildCard(idx){ return MODE==="prompts" ? buildGroupCard(idx) : buildCaptionCard(idx); }

function renderChunk(){
  const frag = document.createDocumentFragment();
  const end = Math.min(rendered + CHUNK, view.length);
  for (let k = rendered; k < end; k++) frag.appendChild(buildCard(view[k]));
  listEl.appendChild(frag);
  rendered = end;
  updateSentinel();
}
function updateSentinel(){
  if (rendered < view.length){ sentinel.style.display = "block"; if (!loading) sentinel.innerHTML = ""; }
  else { sentinel.style.display = "none"; sentinel.innerHTML = ""; }
}
function loadMore(){
  if (loading || rendered >= view.length) return;
  loading = true;
  sentinel.style.display = "block";
  sentinel.innerHTML = '<div class="dotswrap"><span class="dots"><i></i><i></i><i></i></span></div>';
  setTimeout(() => { loading = false; renderChunk(); }, 280);
}

function applyFilter(filter=""){
  curFilter = (filter || "").trim().toLowerCase();
  loading = false;
  view = [];
  if (MODE === "prompts"){
    for (let g = 0; g < GROUPS.length; g++){            // 편 순서 유지 (첫 편이 위)
      const ep = GROUPS[g].ep.toLowerCase();
      const hit = GROUPS[g].items.some(i => (ROWS[i][CH.clipKey]||"").toLowerCase().includes(curFilter));
      if (!curFilter || ep.includes(curFilter) || hit) view.push(g);
    }
  } else {
    for (let i = ROWS.length - 1; i >= 0; i--){         // 캡션은 최신순
      const title = (ROWS[i]["요리/주제"] || "").toLowerCase();
      if (!curFilter || title.includes(curFilter)) view.push(i);
    }
  }
  listEl.innerHTML = "";
  rendered = 0;
  if (!view.length){
    sentinel.style.display = "none"; sentinel.innerHTML = "";
    const empty = curFilter ? "검색 결과가 없어요." : (MODE==="prompts" ? "아직 프롬프트가 없어요." : "아직 캡션이 없어요.");
    listEl.innerHTML = `<div class="state">${empty}</div>`;
    return;
  }
  renderChunk();
  window.scrollTo({ top: 0 });
}

async function copyText(text){
  try { await navigator.clipboard.writeText(text); return true; }
  catch(e){
    try{
      const ta = document.createElement("textarea");
      ta.value = text; ta.setAttribute("readonly","");
      ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
      const ok = document.execCommand("copy"); document.body.removeChild(ta); return ok;
    } catch(e2){ return false; }
  }
}
function showToast(msg, err=false){
  toastEl.textContent = msg; toastEl.className = "toast show" + (err?" err":"");
  clearTimeout(toastTimer); toastTimer = setTimeout(()=> toastEl.className="toast", 1500);
}
listEl.addEventListener("click", async (e) => {
  const pf = e.target.closest(".pf");
  if (!pf) return;
  const text = ROWS[+pf.dataset.i][pf.dataset.k];
  const ok = await copyText(text);
  if (ok){
    pf.classList.add("copied");
    const tap = pf.querySelector(".tap");
    const prev = tap ? tap.textContent : "";
    if (tap) tap.textContent = "복사됨 ✓";
    showToast("복사됐어요 ✓ — 붙여넣기만 하면 끝");
    setTimeout(()=>{ pf.classList.remove("copied"); if (tap) tap.textContent = prev; }, 1400);
  } else showToast("복사 실패 — 길게 눌러 선택하세요", true);
});

let debTimer;
document.getElementById("q").addEventListener("input", (e) => {
  const v = e.target.value;
  clearTimeout(debTimer);
  debTimer = setTimeout(() => applyFilter(v), 150);
});

// ── CSV 로드 ───────────────────────────────────────────────
fetch(CH.csv + "?v=" + Date.now())
  .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
  .then(text => {
    const grid = parseCSV(text).filter(row => row.some(c => (c||"").trim() !== ""));
    const header = grid.shift();
    ROWS = grid.map(cols => { const o = {}; header.forEach((h,idx)=> o[h.trim()] = cols[idx] || ""); return o; });
    if (MODE === "prompts"){
      buildGroups();
      document.getElementById("sub").textContent = CH.sub + " · " + GROUPS.length + "편 " + ROWS.length + "클립";
    } else {
      document.getElementById("sub").textContent = CH.sub + " · " + ROWS.length + "개";
    }
    applyFilter("");
  })
  .catch(err => {
    sentinel.style.display = "none";
    listEl.innerHTML = `<div class="state">CSV를 불러오지 못했어요 (${escapeHtml(String(err.message||err))}).<br>깃허브에 올린 뒤 열면 정상 작동해요.</div>`;
    document.getElementById("sub").textContent = CH.sub;
  });
</script>
</body>
</html>
